version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tlias-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: tlias_db
    ports:
      - "3306:3306"
    volumes:
      - ./sql/tlias_init.sql:/docker-entrypoint-initdb.d/tlias_init.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 5s
      timeout: 10s
      retries: 10

  backend:
    build: ./tlias-backend
    container_name: tlias-backend
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: 123456
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    container_name: tlias-frontend
    ports:
      - "80:80"
    volumes:
      - ./tlias-frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  mysql_data:
