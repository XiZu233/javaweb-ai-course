version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tlias-pro-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: tlias_pro_db
    ports:
      - "3306:3306"
    volumes:
      - ./sql/tlias-pro_init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_pro_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 5s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tlias-pro-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./tlias-pro-server
    container_name: tlias-pro-backend
    ports:
      - "48080:48080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tlias_pro_db?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8
      SPRING_REDIS_HOST: redis
      SPRING_AI_OPENAI_API_KEY: ${KIMI_API_KEY:-mock-key}
      SPRING_AI_OPENAI_BASE_URL: https://api.moonshot.cn/v1
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    image: nginx:alpine
    container_name: tlias-pro-frontend
    ports:
      - "80:80"
    volumes:
      - ./tlias-pro-frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  mysql_pro_data:
  redis_data: