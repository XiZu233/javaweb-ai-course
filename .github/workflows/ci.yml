name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-a:
    name: Build Backend A
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Build with Maven
        run: |
          cd version-a/tlias-backend
          mvn clean compile -DskipTests

  backend-b:
    name: Build Backend B
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Maven
        run: |
          cd version-b/tlias-pro-backend
          mvn clean install -DskipTests

  frontend-a:
    name: Build Frontend A
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '16'
      - name: Build
        run: |
          cd version-a/tlias-frontend
          npm install
          npm run build

  frontend-b:
    name: Build Frontend B
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Build
        run: |
          cd version-b/tlias-pro-frontend
          npm install
          npm run build
